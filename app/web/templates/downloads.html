<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no">
    <title>AFD · 下载管理</title>
    <link rel="stylesheet" href="/static/style.css">
    <style>
        @keyframes fadeIn{from{opacity:0}to{opacity:1}}
        @keyframes sheetUp{from{transform:translateY(20px);opacity:0}to{transform:translateY(0);opacity:1}}
        @keyframes spin{to{transform:rotate(360deg)}}
        @keyframes toastIn{from{opacity:0;transform:translateX(-50%) translateY(10px)}to{opacity:1;transform:translateX(-50%) translateY(0)}}

        .global-progress-bar{position:fixed;top:0;left:0;width:100%;height:2px;z-index:9999;pointer-events:none}
        .global-progress-bar .gp-fill{height:100%;width:0%;background:linear-gradient(90deg,var(--accent),var(--accent-hover));transition:width .5s ease}

        .toast-float{position:fixed;bottom:24px;left:50%;transform:translateX(-50%);padding:10px 20px;background:var(--bg-surface);border:1px solid var(--border-color);border-radius:var(--radius-md);color:var(--text-primary);font-size:.85rem;z-index:9999;box-shadow:var(--shadow-lg);animation:sheetUp .2s ease;display:none;white-space:nowrap}
        .toast-float.success{border-color:var(--green);background:var(--bg-success);color:var(--green)}
        .toast-float.error{border-color:var(--red);background:var(--bg-danger);color:var(--red)}
    </style>
</head>
<body>
    <div class="global-progress-bar" id="globalProgressBar">
        <div class="gp-fill" id="globalProgressFill"></div>
    </div>
    <div class="toast-float" id="toastFloat"></div>

    <div class="topbar">
        <div class="topbar-left">
            <div class="topbar-logo"><span class="logo-afd">AFD</span></div>
            <div class="topbar-nav">
                <a href="/"><span>📂</span><span class="nav-label">文件</span></a>
                <a href="/downloads" class="active"><span>📥</span><span class="nav-label">下载</span></a>
                <a href="/stations"><span>📊</span><span class="nav-label">节点</span></a>
                <a href="/nodes"><span>⚙️</span><span class="nav-label">设置</span></a>
            </div>
        </div>
        <div class="topbar-right">
            <button class="toggle-theme-btn" id="themeToggle" title="切换主题" onclick="toggleTheme()">🌙</button>
        </div>
    </div>

    <div class="container">
        <!-- Form Section -->
        <div class="card" style="margin-bottom:16px">
            <div class="file-list-header">
                <span>📥 新建下载</span>
            </div>
            <div style="padding:16px;display:flex;flex-direction:column;gap:12px">
                <div class="form-inline">
                    <input class="input input-url" id="urlInput" type="text" placeholder="输入下载链接... 支持 HTTP/HTTPS/BT磁链/Magnet" autocomplete="off" onkeydown="if(event.key==='Enter')startDownload()">
                    <button class="btn btn-primary" onclick="startDownload()">⬇ 下载</button>
                </div>
                <div style="display:flex;align-items:center;gap:8px">
                    <input type="file" id="torrentInput" accept=".torrent" style="font-size:.88rem;color:var(--text-tertiary)" onchange="uploadTorrent(this)">
                    <span style="font-size:.85rem;color:var(--text-tertiary)">或上传 .torrent 文件</span>
                </div>
                <div id="uploadStatus" style="font-size:.88rem;color:var(--text-tertiary);display:none"></div>
            </div>
        </div>

        <!-- Active Tasks -->
        <div class="task-section" id="activeSection" style="display:none">
            <div class="task-head">
                <h2>📥 进行中 <span class="count-badge" id="activeCount">0</span></h2>
            </div>
            <div id="activeTasks"></div>
        </div>

        <!-- Paused Tasks -->
        <div class="task-section" id="pausedSection" style="display:none">
            <div class="task-head">
                <h2>⏸️ 已暂停 <span class="count-badge" id="pausedCount">0</span></h2>
            </div>
            <div id="pausedTasks"></div>
        </div>

        <!-- Completed Tasks -->
        <div class="task-section" id="completedSection" style="display:none">
            <div class="task-head">
                <h2>✅ 已完成 <span class="count-badge" id="completedCount">0</span></h2>
            </div>
            <div id="completedTasks"></div>
        </div>

        <!-- Failed Tasks -->
        <div class="task-section" id="failedSection" style="display:none">
            <div class="task-head">
                <h2>❌ 已失败 <span class="count-badge" id="failedCount">0</span></h2>
            </div>
            <div id="failedTasks"></div>
        </div>

        <div class="empty-state" id="emptyState" style="display:flex">
            <span class="emoji">📥</span>
            <h3>暂无下载任务</h3>
            <p>输入下载链接或上传种子文件开始下载</p>
        </div>
    </div>

    <script>
        let pollingTimer = null;

        function toggleTheme() {
            const h = document.documentElement;
            const l = h.getAttribute('data-theme') === 'light';
            h.setAttribute('data-theme', l ? 'dark' : 'light');
            document.getElementById('themeToggle').textContent = l ? '🌙' : '☀️';
            localStorage.setItem('afd-theme', l ? 'dark' : 'light');
        }
        (function(){
            const t = localStorage.getItem('afd-theme') || 'light';
            document.documentElement.setAttribute('data-theme', t);
            const btn = document.getElementById('themeToggle');
            if (btn) btn.textContent = t === 'light' ? '☀️' : '🌙';
        })();

        function progressSim() {
            const bar = document.getElementById('globalProgressFill');
            if (!bar) return;
            bar.style.width = '0%';
            setTimeout(()=>{bar.style.width='60%'},100);
            setTimeout(()=>{bar.style.width='100%'},400);
            setTimeout(()=>{bar.style.opacity='0'},900);
            setTimeout(()=>{bar.style.opacity='1';bar.style.width='0%'},1200);
        }

        function toast(msg, type) {
            const el = document.getElementById('toastFloat');
            el.textContent = msg;
            el.className = 'toast-float' + (type ? ' ' + type : '');
            el.style.display = 'block';
            setTimeout(()=>{el.style.display='none'},3000);
        }

        function formatSize(bytes) {
            if (!bytes || bytes===0) return '-';
            const u = ['B','KB','MB','GB','TB'];
            let i=0, s=bytes;
            while (s>=1024 && i<u.length-1) { s/=1024; i++; }
            return s.toFixed(1)+' '+u[i];
        }

        function esc(s) {
            return s ? String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;') : '';
        }

        function statusBadge(status) {
            const map = { 'downloading':'badge-downloading','paused':'badge-paused','completed':'badge-completed','failed':'badge-failed','pending':'badge-pending','seeding':'badge-seeding' };
            const cls = map[status] || 'badge-pending';
            const label = { 'downloading':'下载中','paused':'已暂停','completed':'已完成','failed':'已失败','pending':'排队中','seeding':'做种中' };
            return '<span class="badge '+cls+'">'+(label[status]||status)+'</span>';
        }

        function progressBar(pct, status) {
            const cls = status==='failed' ? 'progress-bar-red' : (status==='paused' ? 'progress-bar-yellow' : (status==='completed'||status==='seeding' ? 'progress-bar-green' : 'progress-bar-accent'));
            return '<div class="progress-bar-wrap"><div class="progress-bar '+cls+'" style="width:'+Math.min(pct||0,100)+'%"></div></div>';
        }

        function nodeProgHtml(nodes, filename) {
            if (!nodes || nodes.length===0) return '';
            let h = '<div class="node-progress">';
            for (const n of nodes) {
                const cls = n.online ? '' : 'offline';
                h += '<span class="node-label ' + cls + '">' + esc(n.label || n.id) + '</span>' +
                    '<div class="progress-bar-wrap" style="flex:1;max-width:120px"><div class="progress-bar progress-bar-accent" style="width:' + Math.min(n.progress||0,100) + '%"></div></div>' +
                    '<span class="pct">' + (n.progress||0).toFixed(0) + '%</span>';
            }
            h += '</div>';
            return h;
        }

        function renderTask(t) {
            const pct = t.progress || 0;
            const speed = t.speed ? formatSize(t.speed) + '/s' : '';
            const size = t.size ? formatSize(t.size) : '';
            const done = t.downloaded ? formatSize(t.downloaded) : '';
            return '<div class="task-item" data-id="' + esc(t.task_id) + '">' +
                '<div class="task-header">' +
                '<div class="task-info">' +
                '<div class="name">' + esc(t.filename || t.url || '未知') + '</div>' +
                '<div class="url">' + esc(t.url || '') + '</div>' +
                '</div>' +
                '<div class="task-status-col">' +
                '<div class="task-actions">' +
                (t.status === 'paused' ? '<button class="task-action-btn resume" onclick="resumeTask(\''+esc(t.task_id)+'\')" title="恢复">▶</button>' : '') +
                (t.status === 'downloading' ? '<button class="task-action-btn pause" onclick="pauseTask(\''+esc(t.task_id)+'\')" title="暂停">⏸</button>' : '') +
                (t.status === 'pending' ? '<button class="task-action-btn cancel" onclick="cancelTask(\''+esc(t.task_id)+'\')" title="取消">✕</button>' : '') +
                (t.status === 'failed' ? '<button class="task-action-btn retry" onclick="retryTask(\''+esc(t.task_id)+'\')" title="重试">↻</button>' : '') +
                (t.status === 'completed' || t.status === 'seeding' ? '<button class="task-action-btn delete" onclick="deleteTask(\''+esc(t.task_id)+'\')" title="删除">🗑️</button>' : '') +
                '</div>' +
                statusBadge(t.status) +
                '</div>' +
                '</div>' +
                (t.nodes && t.nodes.length > 0 ? nodeProgHtml(t.nodes, t.filename) : '') +
                '<div class="task-meta-bar">' +
                (pct > 0 ? progressBar(pct, t.status) : '') +
                '<span class="meta-chip">' + (done ? done + ' / ' : '') + size + '</span>' +
                (speed ? '<span class="meta-chip">⬆ ' + speed + '</span>' : '') +
                (pct > 0 ? '<span class="meta-chip">' + Math.round(pct) + '%</span>' : '') +
                '</div>' +
                '</div>';
        }

        function renderTasks(tasks, sectionId, containerId, countId) {
            const filtered = tasks;
            const el = document.getElementById(containerId);
            const section = document.getElementById(sectionId);
            if (filtered.length === 0) {
                section.style.display = 'none';
                return;
            }
            section.style.display = 'block';
            document.getElementById(countId).textContent = filtered.length;
            el.innerHTML = filtered.map(renderTask).join('');
        }

        async function fetchTasks() {
            try {
                const res = await fetch('/api/tasks');
                const data = await res.json();
                const tasks = data.tasks || [];

                const active = tasks.filter(t => t.status === 'downloading' || t.status === 'pending');
                const paused = tasks.filter(t => t.status === 'paused');
                const completed = tasks.filter(t => t.status === 'completed' || t.status === 'seeding');
                const failed = tasks.filter(t => t.status === 'failed');

                renderTasks(active, 'activeSection', 'activeTasks', 'activeCount');
                renderTasks(paused, 'pausedSection', 'pausedTasks', 'pausedCount');
                renderTasks(completed, 'completedSection', 'completedTasks', 'completedCount');
                renderTasks(failed, 'failedSection', 'failedTasks', 'failedCount');

                const total = tasks.length;
                document.getElementById('emptyState').style.display = total === 0 ? 'flex' : 'none';
            } catch(err) {
                console.error('fetch error:', err);
            }
        }

        async function startDownload() {
            const input = document.getElementById('urlInput');
            const url = input.value.trim();
            if (!url) { toast('请输入下载链接','error'); return; }
            progressSim();
            try {
                const res = await fetch('/api/task/submit', {
                    method: 'POST',
                    headers: {'Content-Type':'application/json'},
                    body: JSON.stringify({url: url})
                });
                const data = await res.json();
                if (data.status === 'submitted') {
                    toast('✅ 任务已提交','success');
                    input.value = '';
                    fetchTasks();
                } else {
                    toast('❌ ' + (data.error || '提交失败'), 'error');
                }
            } catch(err) {
                toast('❌ 提交失败: ' + err.message, 'error');
            }
        }

        async function uploadTorrent(input) {
            const file = input.files[0];
            if (!file) return;
            const formData = new FormData();
            formData.append('file', file);
            progressSim();
            try {
                const res = await fetch('/api/task/submit_torrent', { method: 'POST', body: formData });
                const data = await res.json();
                if (data.status === 'submitted') {
                    toast('✅ 种子任务已提交','success');
                    input.value = '';
                    fetchTasks();
                } else {
                    toast('❌ ' + (data.error || '提交失败'), 'error');
                }
            } catch(err) {
                toast('❌ 提交失败: ' + err.message, 'error');
            }
        }

        async function pauseTask(id) {
            try { await fetch('/api/task/pause', { method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({task_id:id}) }); fetchTasks(); }
            catch(err) { toast('❌ '+err.message,'error'); }
        }

        async function resumeTask(id) {
            try { await fetch('/api/task/resume', { method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({task_id:id}) }); fetchTasks(); }
            catch(err) { toast('❌ '+err.message,'error'); }
        }

        async function cancelTask(id) {
            try { await fetch('/api/task/cancel', { method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({task_id:id}) }); fetchTasks(); }
            catch(err) { toast('❌ '+err.message,'error'); }
        }

        async function retryTask(id) {
            try { await fetch('/api/task/retry', { method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({task_id:id}) }); fetchTasks(); }
            catch(err) { toast('❌ '+err.message,'error'); }
        }

        async function deleteTask(id) {
            try { await fetch('/api/task/delete', { method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({task_id:id}) }); fetchTasks(); }
            catch(err) { toast('❌ '+err.message,'error'); }
        }

        document.addEventListener('DOMContentLoaded', () => {
            fetchTasks();
            if (pollingTimer) clearInterval(pollingTimer);
            pollingTimer = setInterval(fetchTasks, 5000);
        });
    </script>
</body>
</html>
