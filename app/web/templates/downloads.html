<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no">
    <title>AFD · 下载管理</title>
    <link rel="stylesheet" href="/static/style.css">
    <style>
        @keyframes fadeIn{from{opacity:0}to{opacity:1}}
        @keyframes sheetUp{from{transform:translateY(20px);opacity:0}to{transform:translateY(0);opacity:1}}
        @keyframes spin{to{transform:rotate(360deg)}}
        @keyframes toastIn{from{opacity:0;transform:translateX(-50%) translateY(10px)}to{opacity:1;transform:translateX(-50%) translateY(0)}}

        .global-progress-bar{position:fixed;top:0;left:0;width:100%;height:2px;z-index:9999;pointer-events:none}
        .global-progress-bar .gp-fill{height:100%;width:0%;background:linear-gradient(90deg,var(--accent),var(--accent-hover));transition:width .5s ease}

        .toast-float{position:fixed;bottom:24px;left:50%;transform:translateX(-50%);padding:10px 20px;background:var(--bg-surface);border:1px solid var(--border-color);border-radius:var(--radius-md);color:var(--text-primary);font-size:.85rem;z-index:9999;box-shadow:var(--shadow-lg);animation:sheetUp .2s ease;display:none;white-space:nowrap}
        .toast-float.success{border-color:var(--green);background:var(--bg-success);color:var(--green)}
        .toast-float.error{border-color:var(--red);background:var(--bg-danger);color:var(--red)}

        .task-head-actions{display:flex;align-items:center;gap:8px}
        .check-all-label{display:flex;align-items:center;cursor:pointer;padding:2px}
        .check-all-label input{width:16px;height:16px;cursor:pointer}
        .task-checkbox{display:flex;align-items:center;padding:2px 4px 0 0}
        .task-checkbox input{width:15px;height:15px;cursor:pointer}
        .btn-outline{background:transparent;border:1px solid var(--border-color);color:var(--text-secondary);font-size:.82rem;padding:4px 10px;border-radius:var(--radius-sm);cursor:pointer;transition:.15s}
        .btn-outline:hover{border-color:var(--red);color:var(--red)}
        .btn-outline:disabled{opacity:.4;cursor:not-allowed;border-color:var(--border-color);color:var(--text-tertiary)}
    </style>
</head>
<body>
    <div class="global-progress-bar" id="globalProgressBar">
        <div class="gp-fill" id="globalProgressFill"></div>
    </div>
    <div class="toast-float" id="toastFloat"></div>

    <div class="topbar">
        <div class="topbar-left">
            <div class="topbar-logo"><span class="logo-afd">AFD</span><span class="logo-version">v0.2.1</span></div>
            <div class="topbar-nav">
                <a href="/"><span>📂</span><span class="nav-label">文件</span></a>
                <a href="/downloads" class="active"><span>📥</span><span class="nav-label">下载</span></a>
                <a href="/stations"><span>📊</span><span class="nav-label">节点</span></a>
                <a href="/nodes"><span>🔑</span><span class="nav-label">接入配置</span></a>
            </div>
        </div>
        <div class="topbar-right">
            <button class="toggle-theme-btn" id="themeToggle" title="切换主题" onclick="toggleTheme()">🌙</button>
        </div>
    </div>

    <div class="container">
        <!-- Form Section -->
        <div class="card" style="margin-bottom:16px">
            <div class="file-list-header">
                <span>📥 新建下载</span>
            </div>
            <div style="padding:16px;display:flex;flex-direction:column;gap:12px">
                <div class="form-inline">
                    <input class="input input-url" id="urlInput" type="text" placeholder="输入下载链接... 支持 HTTP/HTTPS/BT磁链/Magnet" autocomplete="off" onkeydown="if(event.key==='Enter')startDownload()">
                    <button class="btn btn-primary" onclick="startDownload()">⬇ 下载</button>
                </div>
                <div style="display:flex;align-items:center;gap:8px">
                    <input type="file" id="torrentInput" accept=".torrent" style="font-size:.88rem;color:var(--text-tertiary)" onchange="uploadTorrent(this)">
                    <span style="font-size:.85rem;color:var(--text-tertiary)">或上传 .torrent 文件</span>
                </div>
                <div id="uploadStatus" style="font-size:.88rem;color:var(--text-tertiary);display:none"></div>
            </div>
        </div>

        <!-- Active Tasks -->
        <div class="task-section" id="activeSection" style="display:none">
            <div class="task-head">
                <h2>📥 进行中 <span class="count-badge" id="activeCount">0</span></h2>
            </div>
            <div id="activeTasks"></div>
        </div>

        <!-- Paused Tasks -->
        <div class="task-section" id="pausedSection" style="display:none">
            <div class="task-head">
                <h2>⏸️ 已暂停 <span class="count-badge" id="pausedCount">0</span></h2>
            </div>
            <div id="pausedTasks"></div>
        </div>

        <!-- Completed Tasks -->
        <div class="task-section" id="completedSection" style="display:none">
            <div class="task-head">
                <h2>✅ 已完成 <span class="count-badge" id="completedCount">0</span></h2>
            </div>
            <div id="completedTasks"></div>
        </div>

        <!-- Failed Tasks -->
        <div class="task-section" id="failedSection" style="display:none">
            <div class="task-head">
                <h2>❌ 已失败 <span class="count-badge" id="failedCount">0</span></h2>
                <div class="task-head-actions">
                    <label class="check-all-label" title="全选">
                        <input type="checkbox" id="failedCheckAll" onchange="toggleAllFailed(this.checked)">
                    </label>
                    <button class="btn btn-sm btn-outline" onclick="clearSelectedFailed()" id="clearFailedBtn" disabled>
                        🗑️ 清理选中
                    </button>
                </div>
            </div>
            <div id="failedTasks"></div>
        </div>

        <div class="empty-state" id="emptyState" style="display:flex">
            <span class="emoji">📥</span>
            <h3>暂无下载任务</h3>
            <p>输入下载链接或上传种子文件开始下载</p>
        </div>
    </div>

    <script>
        let pollingTimer = null;

        function toggleTheme() {
            const h = document.documentElement;
            const l = h.getAttribute('data-theme') === 'light';
            h.setAttribute('data-theme', l ? 'dark' : 'light');
            document.getElementById('themeToggle').textContent = l ? '🌙' : '☀️';
            localStorage.setItem('afd-theme', l ? 'dark' : 'light');
        }
        (function(){
            const t = localStorage.getItem('afd-theme') || 'light';
            document.documentElement.setAttribute('data-theme', t);
            const btn = document.getElementById('themeToggle');
            if (btn) btn.textContent = t === 'light' ? '☀️' : '🌙';
        })();

        const LOCAL_NODE_ID = "{{ node_id }}";

        function progressSim() {
            const bar = document.getElementById('globalProgressFill');
            if (!bar) return;
            bar.style.width = '0%';
            setTimeout(()=>{bar.style.width='60%'},100);
            setTimeout(()=>{bar.style.width='100%'},400);
            setTimeout(()=>{bar.style.opacity='0'},900);
            setTimeout(()=>{bar.style.opacity='1';bar.style.width='0%'},1200);
        }

        function toast(msg, type) {
            const el = document.getElementById('toastFloat');
            el.textContent = msg;
            el.className = 'toast-float' + (type ? ' ' + type : '');
            el.style.display = 'block';
            setTimeout(()=>{el.style.display='none'},3000);
        }

        function formatSize(bytes) {
            if (!bytes || bytes===0) return '-';
            const u = ['B','KB','MB','GB','TB'];
            let i=0, s=bytes;
            while (s>=1024 && i<u.length-1) { s/=1024; i++; }
            return s.toFixed(1)+' '+u[i];
        }

        function esc(s) {
            return s ? String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;') : '';
        }

        function statusText(status) {
            const label = { 'active':'下载中','downloading':'下载中','paused':'已暂停','completed':'已完成','complete':'已完成','failed':'已失败','pending':'排队中','waiting':'等待中','seeding':'做种中','offline':'离线','unknown':'未知' };
            return label[status] || status;
        }

        function statusBadge(status) {
            const map = { 'active':'badge-downloading','downloading':'badge-downloading','paused':'badge-paused','completed':'badge-completed','complete':'badge-completed','failed':'badge-failed','pending':'badge-pending','seeding':'badge-seeding' };
            const cls = map[status] || 'badge-pending';
            return '<span class="badge '+cls+'">'+statusText(status)+'</span>';
        }

        function displayNodeName(n) {
            const raw = String(n.node_name || n.node_id || '').trim();
            const id = String(n.node_id || raw).trim().toLowerCase();
            const names = { sk: 'S.K.', vv: 'V.V.', cc: 'C.C.', kk: 'K.K.', aa: 'A.A.', bb: 'B.B.' };
            if (names[id]) return names[id];
            if (/^[a-z]{2}$/.test(raw)) return raw.toUpperCase().split('').join('.') + '.';
            return raw || '未知节点';
        }

        function progressBar(pct, status, threads) {
            pct = Math.max(0, Math.min(Math.round(pct || 0), 100));
            threads = Math.max(0, parseInt(threads || 0));
            const cls = status==='failed' ? 'progress-bar-red' : (status==='paused' ? 'progress-bar-yellow' : (status==='completed'||status==='complete'||status==='seeding' ? 'progress-bar-green' : 'progress-bar-accent'));
            return '<div class="progress-bar-bubble"><div class="progress-bar-wrap"><div class="progress-bar '+cls+'" style="width:'+pct+'%"></div></div></div>';
        }

        function nodeActionHtml(taskId, status) {
            const safeId = esc(taskId || '');
            let html = '<span class="node-action-group">';
            if (status === 'paused') html += '<button class="node-action-btn action-resume" onclick="resumeTask(\'' + safeId + '\')" title="继续">继续</button>';
            else if (status === 'downloading' || status === 'active') html += '<button class="node-action-btn action-pause" onclick="pauseTask(\'' + safeId + '\')" title="暂停">暂停</button>';
            else if (status === 'pending' || status === 'waiting') html += '<button class="node-action-btn action-cancel danger" onclick="cancelTask(\'' + safeId + '\')" title="取消">取消</button>';
            html += '<button class="node-action-btn action-delete danger" onclick="deleteTask(\'' + safeId + '\')" title="删除文件和节点记录">删除</button>';
            html += '</span>';
            return html;
        }

        function nodeProgHtml(nodes, taskStatus, totalSize, taskId) {
            if (!nodes || nodes.length===0) {
                if (taskStatus === 'downloading' || taskStatus === 'pending' || taskStatus === 'paused') {
                    return '<div class="node-progress" style="padding-top:6px"><div class="node-progress-card"><div class="node-progress-name">等待节点</div><div class="node-progress-chips"><span class="node-chip node-chip-speed">速度 0 B/s</span><span class="node-chip node-chip-done">完成 0%</span>' + nodeActionHtml(taskId, taskStatus) + '</div><div class="node-progress-line">' + progressBar(0, taskStatus, 0) + '<span class="node-threads">线程 0</span>' + statusBadge(taskStatus) + '</div></div></div>';
                }
                return '';
            }
            const ordered = [...nodes].sort((a,b) => {
                const al = a.node_id === LOCAL_NODE_ID ? 0 : 1;
                const bl = b.node_id === LOCAL_NODE_ID ? 0 : 1;
                return al - bl || String(a.node_id || '').localeCompare(String(b.node_id || ''));
            });
            let h = '<div class="node-progress" style="padding-top:6px">';
            for (const n of ordered) {
                const pct = Math.max(0, Math.min(Math.round((n.progress || 0) * 100), 100));
                const speed = n.download_speed ? formatSize(n.download_speed)+'/s' : '0 B/s';
                const status = n.status || 'unknown';
                const doneBytes = totalSize ? totalSize * (n.progress || 0) : 0;
                const done = totalSize ? formatSize(doneBytes) : '-';
                const size = totalSize ? formatSize(totalSize) : '-';
                const rawThreads = n.connections || 0;
                const threads = (status === 'completed' || status === 'complete' || status === 'seeding' || pct >= 100) ? 0 : rawThreads;
                h += '<div class="node-progress-card">' +
                    '<div class="node-progress-name">' + esc(displayNodeName(n)) + '</div>' +
                    '<div class="node-progress-chips">' +
                    '<span class="node-chip node-chip-speed">速度 ' + speed + '</span>' +
                    '<span class="node-chip node-chip-done">完成 ' + pct + '%</span>' +
                    nodeActionHtml(taskId, status) +
                    '</div>' +
                    '<div class="node-progress-line">' +
                    (totalSize ? '<span class="node-size">' + done + ' / ' + size + '</span>' : '') +
                    progressBar(pct, status, threads) +
                    (threads ? '<span class="node-threads">线程 ' + threads + '</span>' : '') +
                    statusBadge(status) +
                    '</div></div>';
            }
            h += '</div>';
            return h;
        }

        function displayFilename(t) {
            if (t.filename) return t.filename;
            const url = t.url || '';
            try {
                const clean = url.split('?')[0].split('#')[0];
                const last = clean.substring(clean.lastIndexOf('/') + 1) || url;
                return decodeURIComponent(last);
            } catch(e) {
                return url || '未知';
            }
        }

        function effectiveTaskStatus(t) {
            const nodes = t.nodes || [];
            const statuses = nodes.map(n => n.status || '').filter(Boolean);
            if (statuses.some(s => s.includes('downloading'))) return 'downloading';
            if (statuses.some(s => s.includes('paused'))) return 'paused';
            if (statuses.some(s => s.includes('pending') || s.includes('waiting'))) return 'pending';
            if (statuses.some(s => s.includes('failed') || s.includes('error'))) return 'failed';
            if (statuses.length && statuses.every(s => s.includes('seeding') || s.includes('completed') || s.includes('complete'))) return 'seeding';
            return t.status || 'pending';
        }

        function renderTask(t) {
            const nodes = t.nodes || [];
            const effectiveStatus = effectiveTaskStatus(t);
            const totalSize = t.total_size || 0;
            const doneSize = t.downloaded_size || 0;
            let totalPct = totalSize > 0 ? Math.round(doneSize / totalSize * 100) : 0;
            if ((effectiveStatus === 'completed' || effectiveStatus === 'seeding') && totalPct === 0) totalPct = 100;
            if (totalPct === 0 && nodes.length > 0) {
                totalPct = Math.round(Math.max(...nodes.map(n => n.progress || 0)) * 100);
            }
            const totalSpeed = nodes.length > 0 ? formatSize(nodes.reduce((s,n) => s + (n.download_speed||0), 0)) + '/s' : '';
            const sizeStr = formatSize(totalSize);
            const doneStr = formatSize(doneSize);
            const showProg = true;
            return '<div class="task-item" data-id="' + esc(t.id) + '">' +
                '<div class="task-header">' +
                '<div class="task-info">' +
                '<div class="name">' + esc(displayFilename(t)) + '</div>' +
                '<div class="url" style="font-size:.72rem;color:var(--text-tertiary);opacity:.75">' + esc(t.url || '') + '</div>' +
                '</div>' +
                '<div class="task-status-col">' +
                '<div class="task-actions">' +
                (effectiveStatus === 'failed' ? '<label class="task-checkbox"><input type="checkbox" class="failed-checkbox" value="'+esc(t.id)+'" onchange="updateClearBtn()"></label>' : '') +
                (effectiveStatus === 'failed' ? '<button class="task-action-btn retry" onclick="retryTask(\''+esc(t.id)+'\')" title="重试">↻</button>' : '') +
                (effectiveStatus === 'completed' || effectiveStatus === 'seeding' ? '<button class="task-action-btn delete" onclick="deleteTask(\''+esc(t.id)+'\')" title="删除">🗑️</button>' : '') +
                '</div>' +
                '</div>' +
                '</div>' +
                nodeProgHtml(nodes, effectiveStatus, totalSize, t.id) +
                '</div>';
        }

        function renderTasks(tasks, sectionId, containerId, countId) {
            const filtered = tasks;
            const el = document.getElementById(containerId);
            const section = document.getElementById(sectionId);
            if (filtered.length === 0) {
                section.style.display = 'none';
                return;
            }
            section.style.display = 'block';
            document.getElementById(countId).textContent = filtered.length;
            el.innerHTML = filtered.map(renderTask).join('');
        }

        async function fetchTasks() {
            try {
                const res = await fetch('/api/tasks');
                const data = await res.json();
                const tasks = data.tasks || [];

                const active = tasks.filter(t => effectiveTaskStatus(t) === 'downloading' || effectiveTaskStatus(t) === 'pending');
                const paused = tasks.filter(t => effectiveTaskStatus(t) === 'paused');
                const completed = tasks.filter(t => effectiveTaskStatus(t) === 'completed' || effectiveTaskStatus(t) === 'seeding');
                const failed = tasks.filter(t => effectiveTaskStatus(t) === 'failed');

                renderTasks(active, 'activeSection', 'activeTasks', 'activeCount');
                renderTasks(paused, 'pausedSection', 'pausedTasks', 'pausedCount');
                renderTasks(completed, 'completedSection', 'completedTasks', 'completedCount');
                renderTasks(failed, 'failedSection', 'failedTasks', 'failedCount');

                const total = tasks.length;
                document.getElementById('emptyState').style.display = total === 0 ? 'flex' : 'none';
            } catch(err) {
                console.error('fetch error:', err);
            }
        }

        async function startDownload() {
            const input = document.getElementById('urlInput');
            const url = input.value.trim();
            if (!url) { toast('请输入下载链接','error'); return; }
            progressSim();
            try {
                const res = await fetch('/api/task/submit', {
                    method: 'POST',
                    headers: {'Content-Type':'application/json'},
                    body: JSON.stringify({url: url})
                });
                const data = await res.json();
                if (data.status === 'submitted') {
                    toast('✅ 任务已提交','success');
                    input.value = '';
                    fetchTasks();
                } else {
                    toast('❌ ' + (data.error || '提交失败'), 'error');
                }
            } catch(err) {
                toast('❌ 提交失败: ' + err.message, 'error');
            }
        }

        async function uploadTorrent(input) {
            const file = input.files[0];
            if (!file) return;
            const formData = new FormData();
            formData.append('file', file);
            progressSim();
            try {
                const res = await fetch('/api/task/submit_torrent', { method: 'POST', body: formData });
                const data = await res.json();
                if (data.status === 'submitted') {
                    toast('✅ 种子任务已提交','success');
                    input.value = '';
                    fetchTasks();
                } else {
                    toast('❌ ' + (data.error || '提交失败'), 'error');
                }
            } catch(err) {
                toast('❌ 提交失败: ' + err.message, 'error');
            }
        }

        async function pauseTask(id) {
            try { await fetch('/api/task/pause', { method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({task_id:id}) }); fetchTasks(); }
            catch(err) { toast('❌ '+err.message,'error'); }
        }

        async function resumeTask(id) {
            try { await fetch('/api/task/resume', { method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({task_id:id}) }); fetchTasks(); }
            catch(err) { toast('❌ '+err.message,'error'); }
        }

        async function cancelTask(id) {
            try { await fetch('/api/task/cancel', { method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({task_id:id}) }); fetchTasks(); }
            catch(err) { toast('❌ '+err.message,'error'); }
        }

        async function retryTask(id) {
            try { await fetch('/api/task/retry', { method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({task_id:id}) }); fetchTasks(); }
            catch(err) { toast('❌ '+err.message,'error'); }
        }

        async function deleteTask(id) {
            if (!confirm('确定删除这个任务、已下载文件和节点记录？删除后不会再展示这些节点。')) return;
            progressSim();
            try {
                const res = await fetch('/api/task/delete', { method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({task_id:id}) });
                const data = await res.json().catch(() => ({}));
                if (!res.ok || data.error) throw new Error(data.error || '删除失败');
                toast('✅ 已删除任务和文件','success');
                fetchTasks();
            }
            catch(err) { toast('❌ '+err.message,'error'); }
        }

        function toggleAllFailed(checked) {
            document.querySelectorAll('.failed-checkbox').forEach(cb => cb.checked = checked);
            updateClearBtn();
        }

        function updateClearBtn() {
            const btn = document.getElementById('clearFailedBtn');
            btn.disabled = document.querySelectorAll('.failed-checkbox:checked').length === 0;
        }

        async function clearSelectedFailed() {
            const checked = document.querySelectorAll('.failed-checkbox:checked');
            if (checked.length === 0) { toast('请先勾选要清理的任务','error'); return; }
            if (!confirm('确定要清理选中的 ' + checked.length + ' 个失败任务？')) return;
            const ids = Array.from(checked).map(cb => cb.value);
            progressSim();
            for (const id of ids) {
                try {
                    await fetch('/api/task/delete', {
                        method:'POST',
                        headers:{'Content-Type':'application/json'},
                        body: JSON.stringify({task_id: id})
                    });
                } catch(err) { console.error('clear failed:', id, err); }
            }
            toast('✅ 已清理 ' + ids.length + ' 个失败任务','success');
            document.getElementById('failedCheckAll').checked = false;
            fetchTasks();
        }

        document.addEventListener('DOMContentLoaded', () => {
            fetchTasks();
            if (pollingTimer) clearInterval(pollingTimer);
            pollingTimer = setInterval(fetchTasks, 5000);
        });
    </script>
</body>
</html>
