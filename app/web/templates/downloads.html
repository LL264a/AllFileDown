<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no">
    <title>📥 下载任务 - AFD</title>
    <link rel="stylesheet" href="/static/style.css">
    <style>
        .page-header {
            padding: 20px 0 14px;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }
        .page-header h1 {
            font-size: 1.15rem;
            font-weight: 700;
            color: var(--text-primary);
        }
        .page-header h1 small {
            font-weight: 400;
            font-size: 0.8rem;
            color: var(--text-tertiary);
            margin-left: 8px;
        }

        .form-section {
            background: var(--bg-surface);
            border: 1px solid var(--border-color);
            border-radius: var(--radius-lg);
            margin-bottom: 16px;
        }
        .form-section .form-head {
            padding: 14px var(--space-xl) 0;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }
        .form-section .form-head h2 {
            font-size: 0.88rem;
            font-weight: 600;
            color: var(--text-secondary);
        }
        .form-section .form-body {
            padding: var(--space-lg) var(--space-xl);
        }

        .form-inline {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
        }
        .form-inline .input-url { flex: 1; min-width: 200px; }

        @media (max-width: 640px) {
            .form-inline { flex-direction: column; }
        }

        .task-section {
            background: var(--bg-surface);
            border: 1px solid var(--border-color);
            border-radius: var(--radius-lg);
            overflow: hidden;
        }
        .task-section .task-head {
            padding: 14px var(--space-xl);
            display: flex;
            align-items: center;
            justify-content: space-between;
            border-bottom: 1px solid var(--border-color);
        }
        .task-section .task-head h2 {
            font-size: 0.88rem;
            font-weight: 600;
            color: var(--text-secondary);
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .task-section .task-head h2 .count-badge {
            font-size: 0.7rem;
            font-weight: 500;
            color: var(--text-tertiary);
            background: var(--bg-surface-alt);
            padding: 1px 8px;
            border-radius: var(--radius-full);
        }

        .refresh-btn {
            display: inline-flex;
            align-items: center;
            gap: 4px;
            padding: 4px 12px;
            background: transparent;
            border: 1px solid var(--border-color);
            border-radius: var(--radius-sm);
            color: var(--text-tertiary);
            cursor: pointer;
            font-size: 0.76rem;
            transition: all var(--transition-fast);
        }
        .refresh-btn:hover {
            color: var(--text-secondary);
            background: var(--bg-surface-hover);
        }

        .clear-btn {
            display: inline-flex;
            align-items: center;
            gap: 4px;
            padding: 4px 12px;
            background: transparent;
            border: 1px solid var(--border-color);
            border-radius: var(--radius-sm);
            color: var(--text-tertiary);
            cursor: pointer;
            font-size: 0.76rem;
            transition: all var(--transition-fast);
        }
        .clear-btn:hover {
            color: var(--red);
            background: var(--red-dim);
            border-color: rgba(239,68,68,0.3);
        }

        .task-status-col {
            display: flex;
            flex-direction: column;
            align-items: flex-end;
            gap: 6px;
            flex-shrink: 0;
        }
        .task-actions {
            display: flex;
            gap: 4px;
        }
        .task-action-btn {
            background: transparent;
            border: 1px solid var(--border-color);
            border-radius: var(--radius-sm);
            width: 24px;
            height: 24px;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            font-size: 0.75rem;
            transition: all var(--transition-fast);
            opacity: 0.5;
            color: var(--text-tertiary);
        }
        .task-action-btn:hover { opacity: 1; }
        .task-action-btn.cancel:hover { color: var(--yellow); border-color: var(--yellow); }
        .task-action-btn.delete:hover { color: var(--red); border-color: var(--red); }

        .task-item:hover .task-action-btn { opacity: 0.7; }

        .task-action-btn.resume:hover { color: var(--green); border-color: var(--green); }
        .task-action-btn.pause:hover { color: var(--yellow); border-color: var(--yellow); }
        .task-action-btn.retry:hover { color: var(--accent); border-color: var(--accent); }

        .badge-warning { background: rgba(234,179,8,0.12); color: var(--yellow); border:1px solid rgba(234,179,8,0.2); }

        .task-meta-bar {
            display: flex;
            gap: 6px;
            margin-top: 6px;
            flex-wrap: wrap;
        }
        .meta-chip {
            display: inline-flex;
            align-items: center;
            gap: 3px;
            padding: 2px 8px;
            font-size: 0.72rem;
            color: var(--text-tertiary);
            background: var(--bg-surface-alt);
            border-radius: var(--radius-sm);
        }

        /* Detail Modal */
        .detail-modal-overlay {
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.75);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 999;
            backdrop-filter: blur(4px);
            animation: fadeIn 0.15s ease;
        }
        .detail-modal {
            background: var(--bg-surface);
            border: 1px solid var(--border-color);
            border-radius: var(--radius-lg);
            width: min(520px, 92vw);
            max-height: 80vh;
            overflow-y: auto;
            animation: sheetUp 0.2s ease;
        }
        .detail-head {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 16px var(--space-xl);
            border-bottom: 1px solid var(--border-color);
        }
        .detail-head h3 {
            font-size: 0.95rem;
            font-weight: 600;
            color: var(--text-primary);
            word-break: break-all;
        }
        .detail-close {
            background: transparent;
            border: none;
            color: var(--text-tertiary);
            font-size: 1.2rem;
            cursor: pointer;
            padding: 4px;
            line-height: 1;
        }
        .detail-close:hover { color: var(--text-primary); }
        .detail-body {
            padding: var(--space-xl);
        }
        .detail-grid {
            display: grid;
            grid-template-columns: auto 1fr;
            gap: 6px 14px;
            font-size: 0.82rem;
        }
        .detail-grid .detail-label {
            color: var(--text-tertiary);
            font-weight: 500;
            white-space: nowrap;
        }
        .detail-grid .detail-value { color: var(--text-secondary); }

        .progress-bar-yellow { background: var(--yellow); }
        @keyframes fadeIn { from { opacity: 0 } to { opacity: 1 } }
        @keyframes sheetUp { from { transform: translateY(20px); opacity: 0 } to { transform: translateY(0); opacity: 1 } }

        .task-item {
            padding: 14px var(--space-xl);
            border-bottom: 1px solid var(--border-color);
            transition: background var(--transition-fast);
        }
        .task-item:last-child { border-bottom: none; }
        .task-item:hover { background: var(--bg-elevated-hover); }

        .task-header {
            display: flex;
            align-items: flex-start;
            justify-content: space-between;
            gap: 12px;
            margin-bottom: 10px;
        }
        .task-info { flex: 1; min-width: 0; }
        .task-info .name {
            font-weight: 600;
            color: var(--text-primary);
            word-break: break-all;
            overflow-wrap: break-word;
            font-size: 0.9rem;
        }
        .task-info .url {
            font-size: 0.75rem;
            color: var(--text-tertiary);
            margin-top: 2px;
            word-break: break-all;
            overflow-wrap: break-word;
        }
        .task-info .size-info {
            font-size: 0.78rem;
            color: var(--green);
            margin-top: 4px;
            font-weight: 500;
        }

        .node-progress {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-top: 6px;
        }
        .node-progress .node-label {
            width: 60px;
            font-size: 0.78rem;
            color: var(--text-tertiary);
            flex-shrink: 0;
            font-weight: 500;
        }
        .node-progress .pct {
            width: 36px;
            text-align: right;
            color: var(--text-tertiary);
            font-size: 0.76rem;
            font-family: var(--font-mono);
        }
    </style>
</head>
<body>
    <div class="topbar">
        <div class="topbar-left">
            <div class="topbar-logo">AFD <span>下载管理</span></div>
            <div class="topbar-nav">
                <a href="/"><span>📂</span><span class="nav-label">文件</span></a>
                <a href="/downloads" class="active"><span>📥</span><span class="nav-label">任务</span></a>
                <a href="/stations"><span>📊</span><span class="nav-label">节点</span></a>
                <a href="/nodes"><span>⚙️</span><span class="nav-label">设置</span></a>
            </div>
        </div>
        <div class="topbar-right">
            <span class="node-tag">{{ node_name }}</span>
        </div>
    </div>

    <div class="container" style="padding-top:0;">
        <div class="page-header">
            <h1>下载任务 <small>实时监控下载进度</small></h1>
        </div>

        <!-- 新建下载 -->
        <div class="form-section">
            <div class="form-head"><h2>创建新下载</h2></div>
            <div class="form-body">
                <form id="downloadForm" class="form-inline">
                    <input type="url" id="downloadUrl" placeholder="输入下载链接..." required class="input input-url">
                    <input type="text" id="filename" placeholder="自定义文件名（可选）" class="input" style="width:180px;flex-shrink:0">
                    <button type="submit" class="btn btn-primary">⬇ 下载</button>
                </form>
                <div id="submitStatus" class="status-msg"></div>
            </div>
        </div>

        <!-- 任务列表 -->
        <div class="task-section">
            <div class="task-head">
                <h2><span>📋</span> 全部任务 <span class="count-badge" id="taskCount">0</span></h2>
                <div style="display:flex;gap:6px">
                    <button class="clear-btn" onclick="clearCompleted()">🗑️ 清除已完成</button>
                    <button class="refresh-btn" onclick="loadTasks()">⟳ 刷新</button>
                </div>
            </div>
            <div id="taskList">
                <div class="loading">
                    <div class="spinner"></div>
                    <div>加载中...</div>
                </div>
            </div>
        </div>
    </div>

    <script src="/static/app.js"></script>
</body>
</html>
