<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no">
    <title>AFD · 登录</title>
    <link rel="stylesheet" href="/static/style.css">
    <style>
        body{display:flex;align-items:center;justify-content:center;min-height:100vh;background:var(--bg-page)}
        .login-box{width:100%;max-width:380px;padding:20px}
        .login-card{background:var(--bg-surface);border:1px solid var(--border-color);border-radius:var(--radius-lg);padding:36px 28px 28px;box-shadow:var(--shadow-lg)}
        .login-logo{text-align:center;margin-bottom:24px}
        .login-logo h1{font-size:1.5rem;font-weight:700;color:var(--text-primary)}
        .login-logo p{font-size:.82rem;color:var(--text-tertiary);margin-top:6px}
        .login-form{display:flex;flex-direction:column;gap:12px}
        .login-form label{font-size:.82rem;font-weight:600;color:var(--text-secondary)}
        .login-form .input{width:100%;padding:10px 14px;font-size:.92rem}
        .login-remember{display:flex;align-items:center;gap:8px;font-size:.82rem;color:var(--text-secondary)}
        .login-remember input[type="checkbox"]{accent-color:var(--accent);width:16px;height:16px}
        .login-btn{width:100%;padding:10px;font-size:.92rem;margin-top:4px}
        .login-error{font-size:.82rem;color:var(--red);text-align:center;display:none;padding:8px;background:var(--bg-danger);border-radius:var(--radius-sm);margin-bottom:12px}
        @media(max-width:480px){.login-box{padding:12px}}
    </style>
</head>
<body>
    <div class="login-box">
        <div class="login-card">
            <div class="login-logo">
                <h1>⚔️ AFD</h1>
                <p>Allfiledown · 文件下载管理</p>
            </div>
            <div class="login-error" id="loginError"></div>
            <form class="login-form" id="loginForm" onsubmit="return doLogin(event)">
                <label for="username">用户名</label>
                <input class="input" id="username" type="text" placeholder="admin" autocomplete="username">
                <label for="password">密码</label>
                <input class="input" id="password" type="password" placeholder="输入密码" autocomplete="current-password">
                <label class="login-remember">
                    <input type="checkbox" id="rememberMe" checked> 记住密码
                </label>
                <button class="btn btn-primary login-btn" type="submit">🔓 登录</button>
                <div style="text-align:center;margin-top:4px">
                    <button class="btn" id="passkeyLoginBtn" type="button" onclick="passkeyLogin()" style="width:100%">🔑 使用通行密钥</button>
                </div>
            </form>
        </div>
    </div>
    <script>
        (function(){
            // 登录页自动继承已保存的 session cookie，无需额外操作
            const saved = localStorage.getItem('afd_auth');
            if (saved) {
                try {
                    const creds = JSON.parse(saved);
                    if (creds && creds.username) document.getElementById('username').value = creds.username;
                } catch(e) {}
            }
            // 检测是否有通行密钥可用
            fetch('/api/auth/passkey/list', {method:'POST', headers:{'Content-Type':'application/json'}})
            .then(r => r.json())
            .then(d => {
                const btn = document.getElementById('passkeyLoginBtn');
                if (btn) btn.style.display = (d.credentials && d.credentials.length) ? '' : 'none';
            })
            .catch(() => {});
        })();

        // ── 通行密钥登录 ──
        async function passkeyLogin() {
            const btn = document.getElementById('passkeyLoginBtn');
            btn.disabled = true;
            btn.textContent = '⏳ 验证中...';
            try {
                const begin = await fetch('/api/auth/passkey/login/begin', {method:'POST', headers:{'Content-Type':'application/json'}});
                const opts = await begin.json();
                if (opts.error) { throw new Error(opts.error); }
                const credential = await navigator.credentials.get({publicKey: opts.publicKey});
                if (!credential) { throw new Error('操作被取消'); }
                const complete = await fetch('/api/auth/passkey/login/complete', {method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({
                    challenge_id: opts.challenge_id,
                    credential: credential.toJSON()
                })});
                const result = await complete.json();
                if (result.authenticated && result.token) {
                    document.cookie = 'afd_token=' + result.token + ';path=/;max-age=86400;SameSite=Lax';
                    window.location.href = result.redirect || '/';
                } else {
                    throw new Error(result.error || '验证失败');
                }
            } catch(e) {
                const errorEl = document.getElementById('loginError');
                if (e.name === 'NotAllowedError') {
                    errorEl.textContent = '验证已取消';
                } else {
                    errorEl.textContent = '通行密钥登录失败: ' + e.message;
                }
                errorEl.style.display = 'block';
                btn.disabled = false;
                btn.textContent = '🔑 使用通行密钥';
            }
        }

        async function doLogin(e) {
            e.preventDefault();
            const username = document.getElementById('username').value.trim() || 'admin';
            const password = document.getElementById('password').value.trim();
            const remember = document.getElementById('rememberMe').checked;
            const errorEl = document.getElementById('loginError');

            if (!password) {
                errorEl.textContent = '请输入密码';
                errorEl.style.display = 'block';
                return false;
            }

            try {
                const res = await fetch('/api/auth/login', {
                    method:'POST',
                    headers:{'Content-Type':'application/json'},
                    body:JSON.stringify({username, password, remember})
                });
                const data = await res.json();
                if (data.authenticated) {
                    if (remember) {
                        localStorage.setItem('afd_auth', JSON.stringify({username}));
                    } else {
                        sessionStorage.setItem('afd_auth', JSON.stringify({username}));
                    }
                    // 设置持久化 cookie（X-Auth-Token）
                    fetch('/api/auth/session', {method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({username, password})})
                    .then(r => r.json())
                    .then(sd => {
                        if (sd.authenticated && sd.token) {
                            document.cookie = 'afd_token=' + sd.token + ';path=/;max-age=' + (remember ? 86400*30 : 86400);
                            document.cookie = 'afd_auth=1;path=/;max-age=' + (remember ? 86400*30 : 86400);
                        }
                    });
                    window.location.href = data.redirect || '/';
                } else {
                    errorEl.textContent = data.error || '用户名或密码错误';
                    errorEl.style.display = 'block';
                }
            } catch(err) {
                errorEl.textContent = '登录失败: ' + err.message;
                errorEl.style.display = 'block';
            }
            return false;
        }
    </script>
</body>
</html>
