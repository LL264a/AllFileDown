<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no">
    <title>AFD · {% block title %}下载管理{% endblock %}</title>
    <link rel="stylesheet" href="/static/style.css">
    {% block extra_head %}{% endblock %}
</head>
<body>
    <div class="topbar">
        <div class="topbar-left">
            <div class="topbar-logo"><span class="logo-afd">AFD</span></div>
            <div class="topbar-nav">
                <a href="/" class="{% block nav_files_class %}{% endblock %}"><span>📂</span><span class="nav-label">文件</span></a>
                <a href="/downloads" class="{% block nav_downloads_class %}{% endblock %}"><span>📥</span><span class="nav-label">下载</span></a>
                <a href="/stations" class="{% block nav_stations_class %}{% endblock %}"><span>📊</span><span class="nav-label">节点</span></a>
                <a href="/nodes" class="{% block nav_nodes_class %}{% endblock %}"><span>⚙️</span><span class="nav-label">设置</span></a>
            </div>
        </div>
        <div class="topbar-right">
            <button class="toggle-theme-btn" id="themeToggle" title="切换主题" onclick="toggleTheme()">🌙</button>
        </div>
    </div>

    <div class="container">
        {% block content %}{% endblock %}
    </div>

    <script>
        function toggleTheme() {
            const h = document.documentElement;
            const l = h.getAttribute('data-theme') === 'light';
            h.setAttribute('data-theme', l ? 'dark' : 'light');
            const btn = document.getElementById('themeToggle');
            if (btn) btn.textContent = l ? '🌙' : '☀️';
            localStorage.setItem('afd-theme', l ? 'dark' : 'light');
        }
        (function(){
            const t = localStorage.getItem('afd-theme') || 'light';
            document.documentElement.setAttribute('data-theme', t);
            const btn = document.getElementById('themeToggle');
            if (btn) btn.textContent = t === 'light' ? '☀️' : '🌙';
        })();
    </script>
    {% block extra_scripts %}{% endblock %}
</body>
</html>
