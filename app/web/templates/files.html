<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no">
    <title>AFD · 文件库</title>
    <link rel="stylesheet" href="/static/style.css">
    <style>
        @keyframes shimmer{0%{background-position:200% 0}100%{background-position:-200% 0}}
        @keyframes fadeIn{from{opacity:0}to{opacity:1}}
        @keyframes sheetUp{from{transform:translateY(20px);opacity:0}to{transform:translateY(0);opacity:1}}
        @keyframes spin{to{transform:rotate(360deg)}}

        .global-progress-bar{position:fixed;top:0;left:0;width:100%;height:2px;z-index:9999;background:transparent;pointer-events:none}
        .global-progress-bar .gp-fill{height:100%;width:0%;background:linear-gradient(90deg,var(--accent),var(--accent-hover));transition:width .5s ease}

        .skeleton-wrap{display:none;margin-bottom:12px}
        .skeleton-wrap.active{display:block}
        .skeleton-row{display:flex;align-items:center;padding:10px 16px;gap:12px;border-bottom:1px solid var(--border-color);background:var(--bg-surface)}
        .skeleton-row:last-child{border-bottom:none}
        .skeleton-shimmer{background:linear-gradient(90deg,var(--bg-surface-alt) 25%,var(--bg-surface-hover) 50%,var(--bg-surface-alt) 75%);background-size:200% 100%;animation:shimmer 1.5s ease infinite;border-radius:var(--radius-sm)}
        .s-s-check{width:16px;height:14px;flex-shrink:0}
        .s-s-icon{width:20px;height:16px;flex-shrink:0}
        .s-s-name{height:14px;flex:1}
        .s-s-size{width:60px;height:14px;flex-shrink:0}
        .s-s-time{width:60px;height:14px;flex-shrink:0}
        .s-s-actions{width:130px;height:28px;flex-shrink:0}

        .toast-float{position:fixed;bottom:24px;left:50%;transform:translateX(-50%);padding:10px 20px;background:var(--bg-surface);border:1px solid var(--border-color);border-radius:var(--radius-md);color:var(--text-primary);font-size:.85rem;z-index:9999;box-shadow:var(--shadow-lg);animation:sheetUp .2s ease;display:none;white-space:nowrap}
        .toast-float.success{border-color:var(--green);background:var(--bg-success);color:var(--green)}
        .toast-float.error{border-color:var(--red);background:var(--bg-danger);color:var(--red)}
    </style>
</head>
<body>
    <div class="global-progress-bar" id="globalProgressBar">
        <div class="gp-fill" id="globalProgressFill"></div>
    </div>
    <div class="toast-float" id="toastFloat"></div>

    <div class="topbar">
        <div class="topbar-left">
            <div class="topbar-logo">AFD <span>文件库</span></div>
            <div class="topbar-nav">
                <a href="/" class="active"><span>📂</span><span class="nav-label">文件</span></a>
                <a href="/downloads"><span>📥</span><span class="nav-label">下载</span></a>
                <a href="/stations"><span>📊</span><span class="nav-label">节点</span></a>
                <a href="/nodes"><span>⚙️</span><span class="nav-label">设置</span></a>
            </div>
        </div>
        <div class="topbar-right">
            <button class="toggle-theme-btn" id="themeToggle" title="切换主题" onclick="toggleTheme()">🌙</button>
        </div>
    </div>

    <div class="container">
        <div class="search-wrap">
            <span class="search-icon">🔍</span>
            <input type="search" id="fileSearch" placeholder="搜索文件..." autocomplete="off" oninput="onSearchInput(this)">
        </div>

        <div class="filter-pills" id="filterPills">
            <span class="filter-pill active" data-filter="" onclick="setFilter(this,'all')">全部</span>
            <span class="filter-pill" data-filter="image" onclick="setFilter(this,'image')">🖼️</span>
            <span class="filter-pill" data-filter="video" onclick="setFilter(this,'video')">🎬</span>
            <span class="filter-pill" data-filter="audio" onclick="setFilter(this,'audio')">🎵</span>
            <span class="filter-pill" data-filter="doc" onclick="setFilter(this,'doc')">📄</span>
            <span class="filter-pill" data-filter="zip" onclick="setFilter(this,'zip')">🗜️</span>
            <span class="filter-pill" data-filter="binary" onclick="setFilter(this,'binary')">⚡</span>
        </div>

        <div class="batch-bar" id="batchBarNested" style="display:none">
            <label style="display:flex;align-items:center;gap:6px;cursor:pointer;font-size:.88rem">
                <input type="checkbox" onchange="toggleAll(this.checked)"> 全选
            </label>
            <span class="batch-count" id="batchCountNested">已选 0 个</span>
            <span id="batchSizeNested" style="color:var(--text-tertiary);font-family:var(--font-mono);font-size:.85rem"></span>
            <button class="btn-batch-del" id="batchDelBtnNested" onclick="deleteSelected()">🗑️ 删除选中</button>
        </div>

        <div class="skeleton-wrap active" id="skeletonWrap">
            <div class="skeleton-row"><span class="skeleton-shimmer s-s-check"></span><span class="skeleton-shimmer s-s-icon"></span><span class="skeleton-shimmer s-s-name"></span><span class="skeleton-shimmer s-s-size"></span><span class="skeleton-shimmer s-s-time"></span><span class="skeleton-shimmer s-s-actions"></span></div>
            <div class="skeleton-row"><span class="skeleton-shimmer s-s-check"></span><span class="skeleton-shimmer s-s-icon"></span><span class="skeleton-shimmer s-s-name" style="max-width:55%"></span><span class="skeleton-shimmer s-s-size"></span><span class="skeleton-shimmer s-s-time"></span><span class="skeleton-shimmer s-s-actions"></span></div>
            <div class="skeleton-row"><span class="skeleton-shimmer s-s-check"></span><span class="skeleton-shimmer s-s-icon"></span><span class="skeleton-shimmer s-s-name" style="max-width:75%"></span><span class="skeleton-shimmer s-s-size"></span><span class="skeleton-shimmer s-s-time"></span><span class="skeleton-shimmer s-s-actions"></span></div>
            <div class="skeleton-row"><span class="skeleton-shimmer s-s-check"></span><span class="skeleton-shimmer s-s-icon"></span><span class="skeleton-shimmer s-s-name" style="max-width:40%"></span><span class="skeleton-shimmer s-s-size"></span><span class="skeleton-shimmer s-s-time"></span><span class="skeleton-shimmer s-s-actions"></span></div>
        </div>

        <div id="fileContent" style="display:none">
            <div class="file-list">
                <div class="file-list-header">
                    <span class="header-name" onclick="setSort('name')" style="cursor:pointer">📄 文件名</span>
                    <span class="header-size" onclick="setSort('size')" style="cursor:pointer">大小</span>
                    <span class="header-time">时间</span>
                    <span class="header-actions">操作</span>
                </div>
                <div id="fileRows"></div>
            </div>
        </div>

        <div class="stats-bar" style="display:none" id="statsBar">
            <div class="count">共 <span id="fileCount">0</span> 个文件</div>
            <div class="total-size" id="totalSize"></div>
        </div>
    </div>

    <div class="source-popup" id="sourcePopup" onclick="closeSourcePopup(event)">
        <div class="source-sheet" onclick="event.stopPropagation()">
            <div class="source-sheet-header">
                <h3 id="sourceTitle">选择下载源</h3>
                <button class="close-btn" onclick="closeSourcePopup()">✕</button>
            </div>
            <div id="sourceList"></div>
        </div>
    </div>

    <script>
        let allFiles = [];
        let currentSort = 'time';
        let searchQuery = '';
        let currentFilter = 'all';
        let selectedIds = new Set();

        function toggleTheme() {
            const h = document.documentElement;
            const l = h.getAttribute('data-theme') === 'light';
            h.setAttribute('data-theme', l ? 'dark' : 'light');
            document.getElementById('themeToggle').textContent = l ? '🌙' : '☀️';
            localStorage.setItem('afd-theme', l ? 'dark' : 'light');
        }
        (function(){
            const t = localStorage.getItem('afd-theme') || 'light';
            document.documentElement.setAttribute('data-theme', t);
            const btn = document.getElementById('themeToggle');
            if (btn) btn.textContent = t === 'light' ? '☀️' : '🌙';
        })();

        function progressSim() {
            const bar = document.getElementById('globalProgressFill');
            if (!bar) return;
            bar.style.width = '0%';
            setTimeout(()=>{bar.style.width='60%'},100);
            setTimeout(()=>{bar.style.width='100%'},400);
            setTimeout(()=>{bar.style.opacity='0'},900);
            setTimeout(()=>{bar.style.opacity='1';bar.style.width='0%'},1200);
        }

        function toast(msg, type) {
            const el = document.getElementById('toastFloat');
            el.textContent = msg;
            el.className = 'toast-float' + (type ? ' ' + type : '');
            el.style.display = 'block';
            setTimeout(()=>{el.style.display='none'},3000);
        }

        function formatSize(bytes) {
            if (!bytes || bytes===0) return '';
            const u = ['B','KB','MB','GB','TB'];
            let i=0, s=bytes;
            while (s>=1024 && i<u.length-1) { s/=1024; i++; }
            return s.toFixed(1) + ' ' + u[i];
        }

        function timeAgo(isoStr) {
            if (!isoStr) return '-';
            const d = new Date(isoStr).getTime();
            if (isNaN(d)) return isoStr;
            const diff = Date.now() - d;
            const min = Math.floor(diff/60000);
            if (min<1) return '刚刚';
            if (min<60) return min+'分钟前';
            const h = Math.floor(min/60);
            if (h<24) return h+'小时前';
            const days = Math.floor(h/24);
            if (days<7) return days+'天前';
            return isoStr.slice(0,10);
        }

        function esc(s) {
            return s ? String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;') : '';
        }

        function escAttr(s) {
            return String(s||'').replace(/&/g,'&amp;').replace(/"/g,'&quot;').replace(/'/g,'&#39;');
        }

        function fileIcon(filename) {
            const ext = filename.split('.').pop()?.toLowerCase();
            const m = {
                txt:'📄',md:'📄',json:'📋',yml:'⚙️',yaml:'⚙️',xml:'📋',csv:'📊',log:'📄',cfg:'⚙️',conf:'⚙️',ini:'⚙️',toml:'⚙️',pdf:'📕',
                zip:'🗜️',rar:'🗜️','7z':'🗜️',tar:'🗜️',gz:'🗜️',bz2:'🗜️',xz:'🗜️',iso:'💿',
                jpg:'🖼️',jpeg:'🖼️',png:'🖼️',gif:'🖼️',webp:'🖼️',svg:'🖼️',bmp:'🖼️',ico:'🖼️',
                mp4:'🎬',avi:'🎬',mkv:'🎬',mov:'🎬',webm:'🎬',flv:'🎬',wmv:'🎬',m4v:'🎬',
                mp3:'🎵',flac:'🎵',wav:'🎵',ogg:'🎵',aac:'🎵',wma:'🎵',m4a:'🎵',
                exe:'⚡',msi:'💿',dmg:'💿',apk:'📱',deb:'📦',rpm:'📦',
                sh:'🐚',py:'🐍',js:'🟨',ts:'🟦',html:'🌐',css:'🎨',torrent:'🧲',
            };
            return m[ext] || '📄';
        }

        function downloadUrl(file) {
            if (!file) return '#';
            if (file.download_url) {
                return file.download_url.startsWith('/') ? window.location.origin + file.download_url : file.download_url;
            }
            return window.location.origin + '/tasks/' + file.task_id + '/' + encodeURIComponent(file.filename);
        }

        async function loadFiles() {
            const skel = document.getElementById('skeletonWrap');
            const fc = document.getElementById('fileContent');
            skel.classList.add('active');
            fc.style.display = 'none';
            try {
                const res = await fetch('/api/files');
                const data = await res.json();
                allFiles = data.files || [];
                await new Promise(r => setTimeout(r,200));
                skel.classList.remove('active');
                fc.style.display = 'block';
                progressSim();
                render();
            } catch(err) {
                skel.classList.remove('active');
                fc.style.display = 'block';
                document.getElementById('fileRows').innerHTML =
                    '<div class="empty-state"><span class="emoji">❌</span><h3>加载失败</h3><p>' +
                    esc(err.message) + '</p>' +
                    '<a class="btn btn-primary" style="display:inline-flex;margin-top:12px" href="javascript:loadFiles()">重试</a></div>';
                document.getElementById('statsBar').style.display = 'none';
            }
        }

        function onSearchInput(el) { searchQuery = el.value.toLowerCase().trim(); render(); }

        function setFilter(el, type) {
            currentFilter = type;
            document.querySelectorAll('.filter-pill').forEach(p => p.classList.remove('active'));
            el.classList.add('active');
            render();
        }

        function setSort(sort) { currentSort = sort; render(); }

        function filtered() {
            const typeExts = {
                image: ['jpg','jpeg','png','gif','webp','svg','bmp','ico'],
                video: ['mp4','avi','mkv','mov','webm','flv','wmv','m4v'],
                audio: ['mp3','flac','wav','ogg','aac','wma','m4a'],
                doc: ['txt','md','json','yml','yaml','xml','csv','log','cfg','conf','ini','toml','pdf','sh','py','js','ts','html','css'],
                zip: ['zip','rar','7z','tar','gz','bz2','xz','iso'],
                binary: ['exe','msi','dmg','apk','deb','rpm','AppImage']
            };
            let files = [...allFiles];
            if (searchQuery) files = files.filter(f => f.filename.toLowerCase().includes(searchQuery) || (f.url && f.url.toLowerCase().includes(searchQuery)));
            if (currentFilter !== 'all') {
                const exts = typeExts[currentFilter] || [];
                files = files.filter(f => exts.includes(f.filename.split('.').pop()?.toLowerCase()));
            }
            return files;
        }

        function sorted(files) {
            return [...files].sort((a,b) => {
                switch(currentSort) {
                    case 'time': return new Date(b.downloaded_at||0) - new Date(a.downloaded_at||0);
                    case 'name': return a.filename.localeCompare(b.filename,'zh');
                    case 'size': return (b.size||0) - (a.size||0);
                    default: return 0;
                }
            });
        }

        function render() {
            const files = sorted(filtered());
            const rowsEl = document.getElementById('fileRows');
            const totalFiles = allFiles.length;
            const totalBytes = allFiles.reduce((a,f) => a + (f.size||0), 0);
            document.getElementById('fileCount').textContent = totalFiles;
            document.getElementById('totalSize').textContent = formatSize(totalBytes);
            document.getElementById('statsBar').style.display = 'flex';

            document.querySelector('.header-name').textContent = '📄 文件名' + (currentSort==='name' ? ' ▾' : '');
            document.querySelector('.header-size').textContent = '大小' + (currentSort==='size' ? ' ▾' : '');
            document.querySelector('.header-time').textContent = '时间' + (currentSort==='time' ? ' ▾' : '');

            if (files.length === 0) {
                rowsEl.innerHTML = '<div class="empty-state"><span class="emoji">' +
                    (searchQuery ? '🔍' : '📂') + '</span><h3>' +
                    (searchQuery ? '没有找到匹配的文件' : '还没有下载完成的文件') + '</h3><p>' +
                    (searchQuery ? '试试其他关键词' : '去下载页面提交链接吧') + '</p>' +
                    (searchQuery ? '' : '<a class="btn btn-primary" style="display:inline-flex;margin-top:14px" href="/downloads">📥 去下载</a>') +
                    '</div>';
                updateBatchBar();
                return;
            }

            let html = '';
            for (const f of files) {
                const multiTag = f.multi_source ? '<span class="multi-source-tag">⊕ 多源</span>' : '';
                const dlUrl = downloadUrl(f);
                html += '<div class="file-row" data-id="' + escAttr(f.task_id) + '">' +
                    '<span class="row-check"><input type="checkbox" class="file-check" data-id="' + escAttr(f.task_id) + '" onchange="updateBatchBar()"></span>' +
                    '<span class="row-icon">' + fileIcon(f.filename) + '</span>' +
                    '<span class="row-name" title="' + escAttr(f.filename) + '">' + esc(f.filename) + multiTag + '</span>' +
                    '<span class="row-size">' + (f.size_formatted || formatSize(f.size) || '?') + '</span>' +
                    '<span class="row-time">' + timeAgo(f.downloaded_at) + '</span>' +
                    '<span class="row-actions">' +
                    '<button class="btn-row btn-dl-row" onclick="window.open(\'' + escAttr(dlUrl) + '\',\'_blank\')" title="下载">⬇</button>' +
                    '<button class="btn-row" onclick="showSources(event,\'' + escAttr(f.task_id) + '\')" title="选择下载源">⊕</button>' +
                    '<button class="btn-row" onclick="renameFile(\'' + escAttr(f.task_id) + '\',\'' + escAttr(f.filename) + '\')" title="重命名">✏️</button>' +
                    '<button class="btn-row btn-del-row" onclick="deleteFile(\'' + escAttr(f.task_id) + '\')" title="删除">🗑️</button>' +
                    '</span></div>';
            }
            rowsEl.innerHTML = html;
            updateBatchBar();
        }

        function updateBatchBar() {
            const checks = document.querySelectorAll('.file-check:checked');
            selectedIds = new Set();
            checks.forEach(cb => selectedIds.add(cb.getAttribute('data-id')));
            const count = selectedIds.size;
            document.getElementById('batchCountNested').textContent = '已选 ' + count + ' 个';
            let totalSize = 0;
            for (const id of selectedIds) {
                const f = allFiles.find(x => x.task_id === id);
                if (f) totalSize += f.size || 0;
            }
            document.getElementById('batchSizeNested').textContent = '共 ' + formatSize(totalSize);
            document.getElementById('batchDelBtnNested').classList.toggle('active', count > 0);
            document.getElementById('batchBarNested').style.display = 'flex';
        }

        function toggleAll(checked) {
            document.querySelectorAll('.file-check').forEach(cb => cb.checked = checked);
            updateBatchBar();
        }

        async function deleteSelected() {
            const ids = Array.from(selectedIds);
            if (!ids.length) return;
            if (!confirm('确定删除选中的 ' + ids.length + ' 个文件？删除后不可恢复。')) return;
            let deleted = 0;
            for (const id of ids) {
                try {
                    const res = await fetch('/api/task/delete', { method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({task_id:id}) });
                    if (res.ok) deleted++;
                } catch {}
            }
            toast('✅ 已删除 ' + deleted + ' 个文件','success');
            loadFiles();
        }

        async function deleteFile(taskId) {
            if (!confirm('确定删除这个文件？')) return;
            try {
                const res = await fetch('/api/task/delete', { method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({task_id:taskId}) });
                if (res.ok) { toast('✅ 已删除','success'); loadFiles(); }
                else { const d = await res.json(); toast('❌ '+d.error,'error'); }
            } catch(err) { toast('❌ 删除失败: '+err.message,'error'); }
        }

        async function renameFile(taskId, currentName) {
            const newName = prompt('请输入新文件名：', currentName);
            if (!newName || newName === currentName) return;
            try {
                const res = await fetch('/api/file/rename', { method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({task_id:taskId, new_name:newName}) });
                const data = await res.json();
                if (data.status === 'renamed') { toast('✅ 已重命名','success'); loadFiles(); }
                else { toast('❌ '+(data.error||'重命名失败'),'error'); }
            } catch(err) { toast('❌ 重命名失败: '+err.message,'error'); }
        }

        function showSources(event, taskId) {
            event.stopPropagation();
            const file = allFiles.find(f => f.task_id === taskId);
            if (!file) return;
            const popup = document.getElementById('sourcePopup');
            const list = document.getElementById('sourceList');
            document.getElementById('sourceTitle').textContent = file.filename;
            let html = '';
            if (file.sources && file.sources.length > 1) {
                for (const s of file.sources) {
                    html += '<div class="source-option" data-url="' + escAttr(s.download_url) + '">' +
                        '<div><div class="node-name">' + esc(s.node_label || s.node_id) + '</div>' +
                        (s.is_local ? '<span style="font-size:.80rem;color:var(--text-tertiary)">本机</span>' : '') +
                        '</div><span class="btn-dl">⬇ 下载</span></div>';
                }
            } else {
                const url = downloadUrl(file);
                html += '<div class="source-option" data-url="' + escAttr(url) + '">' +
                    '<div class="node-name">本机</div><span class="btn-dl">⬇ 下载</span></div>';
            }
            list.innerHTML = html;
            popup.classList.add('show');
        }

        function closeSourcePopup(e) {
            if (e && e.target !== e.currentTarget) return;
            document.getElementById('sourcePopup').classList.remove('show');
        }

        document.addEventListener('click', function(e) {
            const opt = e.target.closest('.source-option');
            if (opt) { const url = opt.getAttribute('data-url'); if (url) window.open(url, '_blank'); }
        });

        document.addEventListener('DOMContentLoaded', () => {
            loadFiles();
            document.addEventListener('click', (e) => {
                const search = document.getElementById('fileSearch');
                if (e.target !== search) search.blur();
            });
        });
    </script>
</body>
</html>
