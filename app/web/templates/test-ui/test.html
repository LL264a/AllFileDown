<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AFD · IDM 风格分块测试页</title>
  <style>
    :root {
      color-scheme: dark;
      --bg: #0f1218;
      --panel: #171b24;
      --panel-2: #11151d;
      --text: #e6edf6;
      --muted: #8d98aa;
      --border: #2a3140;
      --done: #6fe17a;
      --active: #ffd166;
      --pending: #2a3040;
      --bar-bg: #0b0e14;
      --shadow: 0 18px 48px rgba(0, 0, 0, 0.35);
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      min-height: 100vh;
      background:
        radial-gradient(circle at top, rgba(76, 110, 245, 0.12), transparent 34%),
        linear-gradient(180deg, #0b0e14 0%, var(--bg) 100%);
      color: var(--text);
      font: 14px/1.5 system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      display: grid;
      place-items: center;
      padding: 24px;
    }

    .card {
      width: min(980px, 100%);
      background: linear-gradient(180deg, rgba(23,27,36,0.98) 0%, rgba(17,21,29,0.98) 100%);
      border: 1px solid var(--border);
      border-radius: 18px;
      box-shadow: var(--shadow);
      overflow: hidden;
    }

    .hero {
      padding: 24px 24px 18px;
      border-bottom: 1px solid var(--border);
      background: linear-gradient(180deg, rgba(255,255,255,0.03), transparent);
    }

    .title {
      display: flex;
      align-items: center;
      gap: 12px;
      flex-wrap: wrap;
      margin-bottom: 8px;
    }

    .title h1 {
      margin: 0;
      font-size: 20px;
      letter-spacing: 0.2px;
    }

    .badge {
      display: inline-flex;
      align-items: center;
      padding: 3px 10px;
      border-radius: 999px;
      font-size: 12px;
      color: #f3f7fb;
      background: rgba(111, 225, 122, 0.14);
      border: 1px solid rgba(111, 225, 122, 0.28);
    }

    .sub {
      color: var(--muted);
      margin: 0;
    }

    .main {
      padding: 22px 24px 24px;
      display: grid;
      gap: 18px;
    }

    .stats {
      display: grid;
      grid-template-columns: repeat(4, minmax(0, 1fr));
      gap: 12px;
    }

    .stat {
      background: rgba(255,255,255,0.03);
      border: 1px solid rgba(255,255,255,0.05);
      border-radius: 14px;
      padding: 14px 15px;
    }

    .stat .label {
      color: var(--muted);
      font-size: 12px;
      margin-bottom: 4px;
    }

    .stat .value {
      font-size: 16px;
      font-weight: 700;
      font-variant-numeric: tabular-nums;
    }

    .bar-shell {
      background: var(--panel-2);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 16px;
    }

    .bar-top {
      display: flex;
      justify-content: space-between;
      gap: 12px;
      flex-wrap: wrap;
      align-items: center;
      margin-bottom: 12px;
    }

    .bar-title {
      font-weight: 600;
    }

    .legend {
      color: var(--muted);
      font-size: 12px;
      display: flex;
      gap: 12px;
      flex-wrap: wrap;
    }

    .legend span {
      display: inline-flex;
      align-items: center;
      gap: 6px;
    }

    .swatch {
      width: 11px;
      height: 11px;
      border-radius: 3px;
      display: inline-block;
    }

    .swatch.done { background: linear-gradient(180deg, #9bf0a3 0%, var(--done) 100%); }
    .swatch.active { background: linear-gradient(180deg, #ffe396 0%, var(--active) 100%); }
    .swatch.pending { background: var(--pending); }

    .bar {
      display: grid;
      grid-template-columns: repeat(var(--pieces), 1fr);
      gap: 4px;
      background: var(--bar-bg);
      border: 1px solid #232938;
      border-radius: 12px;
      padding: 10px;
      min-height: 46px;
    }

    .piece {
      position: relative;
      height: 24px;
      border-radius: 6px;
      background: linear-gradient(180deg, #212735 0%, #171c27 100%);
      border: 1px solid rgba(255,255,255,0.04);
      overflow: hidden;
    }

    .piece.done {
      background: linear-gradient(180deg, #9bf0a3 0%, #57d567 100%);
      box-shadow: inset 0 1px 0 rgba(255,255,255,0.25);
    }

    .piece.active {
      background: linear-gradient(180deg, #ffe396 0%, #ffbf31 100%);
      box-shadow: 0 0 0 1px rgba(255, 209, 102, 0.18) inset;
    }

    .piece.active::after {
      content: "";
      position: absolute;
      inset: 0;
      background: linear-gradient(120deg, transparent 0%, rgba(255,255,255,0.34) 50%, transparent 100%);
      transform: translateX(-100%);
      animation: sweep 1s linear infinite;
    }

    @keyframes sweep {
      to { transform: translateX(100%); }
    }

    .controls {
      display: grid;
      grid-template-columns: 1fr auto auto auto;
      gap: 10px;
      align-items: center;
      margin-top: 16px;
    }

    .controls input[type="range"] {
      width: 100%;
    }

    .btn {
      appearance: none;
      border: 1px solid var(--border);
      background: linear-gradient(180deg, #222838 0%, #171c27 100%);
      color: var(--text);
      border-radius: 10px;
      padding: 10px 14px;
      font: inherit;
      cursor: pointer;
      transition: transform 0.15s ease, border-color 0.15s ease, background 0.15s ease;
      white-space: nowrap;
    }

    .btn:hover {
      transform: translateY(-1px);
      border-color: #40506a;
    }

    .btn.primary {
      background: linear-gradient(180deg, #3a66ff 0%, #2d4fca 100%);
      border-color: #4b6ef6;
    }

    .hint {
      margin-top: 12px;
      color: var(--muted);
      font-size: 12px;
    }

    .footer {
      padding: 0 24px 22px;
      color: var(--muted);
      font-size: 12px;
    }

    @media (max-width: 760px) {
      .stats { grid-template-columns: repeat(2, minmax(0, 1fr)); }
      .controls { grid-template-columns: 1fr 1fr; }
      .controls .range-wrap { grid-column: 1 / -1; }
    }
  </style>
</head>
<body>
  <div class="card">
    <div class="hero">
      <div class="title">
        <h1>AFD · IDM 风格分块下载测试页</h1>
        <span class="badge">/test-ui</span>
      </div>
      <p class="sub">这页就是给你看“像 IDM 那样的分块条”——能看到已完成、正在下载、未开始的块。</p>
    </div>

    <div class="main">
      <div class="stats">
        <div class="stat">
          <div class="label">文件</div>
          <div class="value" id="fileName">ubuntu.iso</div>
        </div>
        <div class="stat">
          <div class="label">进度</div>
          <div class="value" id="percentText">37%</div>
        </div>
        <div class="stat">
          <div class="label">速度</div>
          <div class="value" id="speedText">18.4 MiB/s</div>
        </div>
        <div class="stat">
          <div class="label">线程</div>
          <div class="value" id="threadText">8</div>
        </div>
      </div>

      <div class="bar-shell">
        <div class="bar-top">
          <div class="bar-title">分块状态</div>
          <div class="legend">
            <span><i class="swatch done"></i> 已完成</span>
            <span><i class="swatch active"></i> 正在下载</span>
            <span><i class="swatch pending"></i> 未开始</span>
          </div>
        </div>
        <div class="bar" id="pieceBar" style="--pieces: 40;"></div>
        <div class="hint">你要的就是这个味儿：不是一条死进度，而是块在动。</div>
      </div>

      <div class="controls">
        <div class="range-wrap">
          <input id="progressRange" type="range" min="0" max="100" value="37" />
        </div>
        <button class="btn" id="toggleBtn">暂停动画</button>
        <button class="btn" id="randomBtn">随机块</button>
        <button class="btn primary" id="demoBtn">播放演示</button>
      </div>
    </div>

    <div class="footer">
      提示：如果你后面要接 aria2 RPC，我也可以把这个页面直接改成读 bitfield 的真实版本。
    </div>
  </div>

  <script>
    const pieces = 40;
    const bar = document.getElementById('pieceBar');
    const range = document.getElementById('progressRange');
    const percentText = document.getElementById('percentText');
    const speedText = document.getElementById('speedText');
    const threadText = document.getElementById('threadText');
    const toggleBtn = document.getElementById('toggleBtn');
    const randomBtn = document.getElementById('randomBtn');
    const demoBtn = document.getElementById('demoBtn');

    let progress = Number(range.value) / 100;
    let activeIndex = 15;
    let timer = null;
    let playing = true;

    for (let i = 0; i < pieces; i++) {
      const piece = document.createElement('div');
      piece.className = 'piece';
      piece.dataset.index = String(i);
      bar.appendChild(piece);
    }

    function formatSpeed(value) {
      return value.toFixed(1) + ' MiB/s';
    }

    function render() {
      const doneCount = Math.floor(progress * pieces);
      const items = [...bar.children];

      items.forEach((el, i) => {
        el.className = 'piece';
        if (i < doneCount) el.classList.add('done');
        else if (i === activeIndex && progress < 1) el.classList.add('active');
      });

      const pct = Math.round(progress * 100);
      percentText.textContent = pct + '%';
      speedText.textContent = formatSpeed(8 + progress * 28);
      threadText.textContent = String(Math.max(1, Math.min(16, 4 + Math.ceil(progress * 8))));
      range.value = pct;
    }

    function setProgress(value) {
      progress = Math.max(0, Math.min(1, value));
      activeIndex = Math.min(pieces - 1, Math.floor(progress * pieces));
      render();
    }

    range.addEventListener('input', (e) => {
      setProgress(Number(e.target.value) / 100);
    });

    randomBtn.addEventListener('click', () => {
      setProgress(Math.random());
    });

    toggleBtn.addEventListener('click', () => {
      playing = !playing;
      toggleBtn.textContent = playing ? '暂停动画' : '继续动画';
    });

    demoBtn.addEventListener('click', () => {
      setProgress(0.37);
      playing = true;
      toggleBtn.textContent = '暂停动画';
    });

    timer = setInterval(() => {
      if (!playing) return;
      if (progress >= 1) {
        setProgress(1);
        return;
      }
      const drift = 0.0025 + Math.random() * 0.0105;
      setProgress(progress + drift);
    }, 180);

    render();
  </script>
</body>
</html>
